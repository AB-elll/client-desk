client:
  name: "合同会社Kara's"
  id: "karas"

store:
  type: sheets   # sheets → supabase に変えるだけで移行完了

drivedesk:
  spreadsheet_id: "${DRIVEDESK_SPREADSHEET_ID}"
  poll_interval_seconds: 300

sheets:
  spreadsheet_id: "${CLIENTDESK_SHEET_ID}"
  dashboard_sheet: "ダッシュボード"
  alert_sheet: "⚠️ 期限アラート"

alerts:
  default_thresholds_days: [90, 30, 7]

logger:
  type: google_spreadsheet
  spreadsheet_id: "${CLIENTDESK_SHEET_ID}"
  sheet_name: "ClientDesk Log"
